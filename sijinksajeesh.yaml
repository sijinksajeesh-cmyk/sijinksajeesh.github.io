# ============================================================
# Render Blueprint — sijin-portfolio
# https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: sijin-portfolio
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false

    envVars: []

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: public, max-age=3600

    routes:
      - type: rewrite
        source: /*
        destination: /sijin-portfolio.html
