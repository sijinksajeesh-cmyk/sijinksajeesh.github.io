previews:
  generation: automatic

services:
  - type: web
    name: sijin-portfolio
    runtime: static
    repo: https://github.com/sijinksajeesh-cmyk/sijinksajeesh.0n1ine.io
    branch: main
    buildCommand: ""
    staticPublishPath: .

    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    routes:
      - type: rewrite
        source: /resume
        destination: /sijin-cv.html
      - type: rewrite
        source: /cv
        destination: /sijin-cv.html
      - type: rewrite
        source: /*
        destination: /index.html
